<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magnum Courses</title>
  <style>
    /* Premium Brand Palette Configuration */
    :root {
      --blue: #4fc3f7;
      --orange: #ff9800;
      --pink: #e91e8c;
      --bg: #f8f6f2; /* Professional warm beige */
      --white: #ffffff;
      --dark: #1a1a2e;
      --text: #2d2d3a;
      --dim: #6b6b80;
      --border: #e8e2da;
      --font: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--font);
      line-height: 1.6;
      padding-top: 80px;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    h1, h2, h3, h4 {
      color: var(--dark);
      word-break: break-word;
      font-weight: 700;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    /* Fixed Navigation Bar */
    .nav-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 80px;
      background-color: rgba(248, 246, 242, 0.95);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 max(2rem, calc((100% - 1200px) / 2));
    }

    /* CSS CSS-Only Brand Logo Vectors */
    .logo-container {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      user-select: none;
    }

    .logo-waves {
      display: flex;
      gap: 5px;
      align-items: center;
      height: 32px;
    }

    .logo-wave-item {
      width: 6px;
      height: 28px;
      border-radius: 4px;
      transform: skewY(-20deg); /* Mimics the distinctive s-wave curve of your brand logo */
    }

    .logo-text {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--dark);
      letter-spacing: -1px;
    }

    /* Navigation Tabs Driven to the Far Right */
    .nav-right-zone {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .nav-tabs {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nav-tab-pill {
      background: transparent;
      border: 1px solid transparent;
      padding: 8px 16px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 0.92rem;
      cursor: pointer;
      color: var(--dim);
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .nav-tab-pill:hover {
      color: var(--dark);
      background: rgba(26, 26, 46, 0.04);
    }

    /* Active State Enforcements */
    .nav-tab-pill.active[data-color="dark"] { background: var(--dark); color: var(--white); }
    .nav-tab-pill.active[data-color="blue"] { background: var(--blue); color: var(--dark); }
    .nav-tab-pill.active[data-color="orange"] { background: var(--orange); color: var(--dark); }
    .nav-tab-pill.active[data-color="pink"] { background: var(--pink); color: var(--white); }

    .btn-back {
      display: none;
      align-items: center;
      gap: 8px;
      background: var(--white);
      border: 1px solid var(--border);
      padding: 10px 20px;
      border-radius: 24px;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      color: var(--text);
      transition: all 0.2s;
    }

    .btn-back:hover {
      background: var(--dark);
      color: var(--white);
      border-color: var(--dark);
    }

    /* Structural Grid Boundaries */
    .container {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 2.5rem 2rem;
      flex: 1;
    }

    .page-view {
      display: none;
    }

    .page-view.active {
      display: block;
    }

    /* Professional Center-Aligned Hero Layout */
    .hero {
      padding: 5rem 0;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .hero-eyebrow {
      font-size: 0.9rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--dim);
      margin-bottom: 1rem;
    }

    .hero h1 {
      font-size: 3.5rem;
      line-height: 1.2;
      margin-bottom: 1.5rem;
      letter-spacing: -1px;
      max-width: 850px;
    }

    .hero-desc {
      font-size: 1.25rem;
      color: var(--dim);
      max-width: 650px;
      margin-bottom: 2.5rem;
    }

    .hero-stripe-line {
      display: flex;
      height: 5px;
      width: 180px;
      border-radius: 3px;
      overflow: hidden;
    }

    .hero-stripe-line span {
      flex: 1;
      height: 100%;
    }

    /* Academic Course Grid System */
    .grid-layout {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 2rem;
      margin-top: 1rem;
    }

    .course-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      cursor: pointer;
      transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94), box-shadow 0.3s ease;
      box-shadow: 0 4px 6px rgba(26, 26, 46, 0.02);
    }

    .course-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 30px rgba(26, 26, 46, 0.06);
    }

    .card-accent-bar {
      height: 6px;
      width: 100%;
    }

    .card-body {
      padding: 2rem;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .card-emoji-box {
      font-size: 2.2rem;
      margin-bottom: 1.25rem;
    }

    .card-title {
      font-size: 1.45rem;
      line-height: 1.3;
      margin-bottom: 0.6rem;
    }

    .badge-level {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 6px;
      background: var(--bg);
      color: var(--dark);
      width: fit-content;
      margin-bottom: 1.25rem;
    }

    .card-desc {
      font-size: 0.95rem;
      color: var(--dim);
      margin-bottom: 2rem;
      flex: 1;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid var(--border);
      padding-top: 1.25rem;
      font-size: 0.88rem;
      color: var(--dim);
      font-weight: 500;
    }

    .card-footer-meta {
      display: flex;
      gap: 12px;
    }

    .card-arrow {
      font-weight: bold;
      font-size: 1.2rem;
      transition: transform 0.2s ease;
    }

    .course-card:hover .card-arrow {
      transform: translateX(4px);
    }

    /* Playlist Metrics Panels */
    .playlist-hero {
      display: flex;
      gap: 2.5rem;
      align-items: center;
      padding-bottom: 3.5rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 3.5rem;
    }

    .pl-hero-emoji {
      font-size: 4.5rem;
      background: var(--white);
      padding: 1.75rem;
      border-radius: 24px;
      border: 1px solid var(--border);
      line-height: 1;
    }

    .pl-hero-info {
      flex: 1;
    }

    .pl-title {
      font-size: 2.8rem;
      letter-spacing: -0.5px;
      margin-bottom: 0.75rem;
    }

    .pl-desc {
      font-size: 1.15rem;
      color: var(--dim);
      margin-bottom: 1.75rem;
      max-width: 750px;
    }

    .pl-stats-row {
      display: flex;
      flex-wrap: wrap;
      gap: 32px;
    }

    .pl-stat-node {
      display: flex;
      flex-direction: column;
    }

    .pl-stat-val {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--dark);
    }

    .pl-stat-lbl {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Syllabus Flow Segments */
    .curriculum-flow {
      display: flex;
      flex-direction: column;
      gap: 3rem;
      max-width: 900px;
      margin: 0 auto 5rem auto;
    }

    .section-block {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      margin-bottom: 2rem;
    }

    .section-index-ring {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1rem;
      color: var(--dark);
      flex-shrink: 0;
    }

    .section-title {
      font-size: 1.5rem;
    }

    .video-stack {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 2.5rem;
    }

    .video-node {
      display: flex;
      align-items: center;
      padding: 14px 20px;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 12px;
      transition: all 0.2s ease;
    }

    .video-node:hover {
      background: #faf8f5;
      border-color: var(--dim);
    }

    .video-play-ring {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      margin-right: 16px;
      flex-shrink: 0;
    }

    .video-details {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .video-name {
      font-weight: 600;
      font-size: 1rem;
      color: var(--dark);
    }

    .video-runtime {
      font-size: 0.9rem;
      color: var(--dim);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Formative Diagnostic Components */
    .assessment-block {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 2rem;
    }

    .assessment-title {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--dim);
      margin-bottom: 1.5rem;
      font-weight: 700;
    }

    .quiz-item {
      margin-bottom: 2rem;
    }

    .quiz-item:last-child {
      margin-bottom: 0;
    }

    .quiz-prompt {
      font-weight: 600;
      font-size: 1.05rem;
      margin-bottom: 1.25rem;
      color: var(--dark);
    }

    .quiz-options-matrix {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .opt-btn {
      background: var(--white);
      border: 1px solid var(--border);
      padding: 14px 20px;
      border-radius: 10px;
      text-align: left;
      font-size: 0.95rem;
      cursor: pointer;
      font-family: var(--font);
      color: var(--text);
      transition: all 0.2s ease;
    }

    .opt-btn:hover {
      border-color: var(--dim);
      background: #faf8f5;
    }

    /* Final Exam Module */
    .capstone-card {
      background: var(--white);
      border: 2px solid var(--dark);
      border-radius: 24px;
      padding: 3.5rem 2.5rem;
      text-align: center;
      margin-top: 5rem;
      box-shadow: 0 10px 30px rgba(26,26,46,0.04);
    }

    .capstone-icon {
      font-size: 3.5rem;
      margin-bottom: 1.25rem;
    }

    .capstone-title {
      font-size: 2rem;
      margin-bottom: 0.75rem;
    }

    .capstone-desc {
      font-size: 1.1rem;
      color: var(--dim);
      margin-bottom: 3rem;
      max-width: 550px;
      margin-left: auto;
      margin-right: auto;
    }

    /* Code-Only Footer Architecture */
    .footer-bar {
      background-color: var(--dark);
      color: var(--white);
      padding: 2.5rem max(2rem, calc((100% - 1200px) / 2));
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: auto;
    }

    .footer-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    /* Pure code-based brand marks in footer context */
    .footer-logo-simulation {
      display: flex;
      gap: 4px;
      align-items: center;
      height: 20px;
      opacity: 0.8;
    }

    .footer-logo-simulation span {
      width: 4px;
      height: 18px;
      border-radius: 2px;
      transform: skewY(-20deg);
    }

    .footer-copy {
      font-size: 0.9rem;
      opacity: 0.6;
    }

    .footer-stripes {
      display: flex;
      gap: 4px;
      width: 45px;
      height: 6px;
    }

    .footer-stripes span {
      flex: 1;
      height: 100%;
      border-radius: 1px;
    }

    /* Screen Width Breakpoint Adjustments */
    @media (max-width: 900px) {
      .nav-bar {
        padding: 0 1.5rem;
      }
      .nav-tabs {
        display: none; /* Auto-collapse layout nodes safely on smaller devices */
      }
      .playlist-hero {
        flex-direction: column;
        text-align: center;
        gap: 1.5rem;
      }
      .pl-stats-row {
        justify-content: center;
      }
    }

    @media (max-width: 600px) {
      body { padding-top: 70px; }
      .nav-bar { height: 70px; }
      .logo-text { font-size: 1.25rem; }
      .hero { padding: 3rem 0; }
      .hero h1 { font-size: 2.4rem; }
      .container { padding: 1.5rem 1rem; }
      .grid-layout { grid-template-columns: 1fr; }
      .section-block { padding: 1.5rem; }
      .video-details { flex-direction: column; align-items: flex-start; gap: 6px; }
    }
  </style>
</head>

        {
          id: "el1",
          cat: "el",
          emoji: "⚡",
          color: "pink",
          accent: "var(--pink)",
          title: "Electronics Level 1",
          subtitle: "Beginner",
          desc: "Acquire systematic mastery over foundational hardware circuits, Ohm's law operations, and analog structural connections.",
          sections: [
            {
              title: "Basic Hardware Architecture & Energy Paths",
              videos: [
                { title: "Potential Differences, Electron Tracks, and Currents", dur: "20:15", link: "https://www.youtube.com/watch?v=1xPjES-sHwg" },
                { title: "Resistive Materials, Operational Diodes & Load Protections", dur: "22:40", link: "https://www.youtube.com/watch?v=Gc1wVbixfHA" }
              ],
              quiz: [
                { q: "Which mathematical formula properly governs circuit relationships under static environmental configurations?", opts: ["P = IV", "V = IR", "F = MA", "E = MC²"], ans: 1 },
                { q: "What critical system failure occurs if a voltage source links directly back to common ground without inline loads?", opts: ["Open Impedance", "Resistive Shift", "Short Circuit", "Capacitive Saturation"], ans: 2 }
              ]
            }
          ],
          finalQuiz: [
            { q: "What primary unit metric tracks electrical charge flow rates traversing fixed cross-sections per second?", opts: ["Volts", "Ohms", "Amperes", "Farads"], ans: 2 }
          ]
        },
        {
          id: "el2",
          cat: "el",
          emoji: "⚡",
          color: "pink",
          accent: "var(--pink)",
          title: "Electronics Level 2",
          subtitle: "Intermediate",
          desc: "Prototype structural sensor frameworks on schematic nodes using physical prototyping breadboards.",
          sections: [
            {
              title: "Prototyping Frameworks & Parallel Matrix Wiring",
              videos: [
                { title: "Internal Rail Architectures and Node Grid Continuities", dur: "19:50", link: "https://www.youtube.com/watch?v=6WReFkAy0Dg" }
              ],
              quiz: [
                { q: "How are the central lateral rows on standard prototyping breadboards linked under structural frameworks?", opts: ["Vertical Columns", "Horizontal Multi-nodes", "Diagonal Matrices", "Isolated Independent Points"], ans: 1 }
              ]
            }
          ],
          finalQuiz: [
            { q: "When wiring discrete LEDs into electrical circuit structures, which terminal matches the positive anode?", opts: ["Shorter Pin", "Flat Notch Side", "Longer Pin", "Internal Large Frame Plate"], ans: 2 }
          ]
        },
        {
          id: "el3",
          cat: "el",
          emoji: "⚡",
          color: "pink",
          accent: "var(--pink)",
          title: "Electronics Level 3",
          subtitle: "Advanced",
          desc: "Design complex processing frameworks utilizing integrated logic gates, microcontrollers, and digital bus architectures.",
          sections: [
            {
              title: "Integrated Logic Matrix & Digital Bus Systems",
              videos: [
                { title: "Binary Signals, High-Low Threshold States & Gate Arrays", dur: "31:10", link: "https://www.youtube.com/watch?v=gI-qXJKFlRA" }
              ],
              quiz: [
                { q: "Which specific logic gate node requires all operational inputs to evaluate high for execution to flow high?", opts: ["OR", "NAND", "AND", "XOR"], ans: 2 }
              ]
            }
          ],
          finalQuiz: [
            { q: "What duty-cycle signal manipulation method processes variable analog outputs from rigid digital microcontrollers?", opts: ["ADC Processing", "PWM Modulation", "UART Handshaking", "I2C Addressing"], ans: 1 }
          ]
        }
      ]
    };

    // Client Execution States
    let activeCat = "all";
    const quizState = {};

    // Layout References
    const domHome = document.getElementById("page-home");
    const domPlaylist = document.getElementById("page-playlist");
    const domNavBack = document.getElementById("nav-back");
    const catContainer = document.getElementById("categories-container");
    const plContainer = document.getElementById("playlists-container");
    const plHeaderTarget = document.getElementById("playlist-header-target");
    const plModulesTarget = document.getElementById("playlist-modules-target");

    window.addEventListener("DOMContentLoaded", () => {
      renderCategoryTabs();
      renderPlaylistGrid();
    });

    // Populate Top Navigation Tab Controls
    function renderCategoryTabs() {
      catContainer.innerHTML = data.categories.map(cat => {
        const isActive = cat.id === activeCat ? "active" : "";
        return `
          <button 
            class="nav-tab-pill ${isActive}" 
            data-id="${cat.id}" 
            data-color="${cat.color}"
            onclick="setCategoryFilter('${cat.id}')">
            ${cat.label}
          </button>
        `;
      }).join('');
    }

    function setCategoryFilter(catId) {
      activeCat = catId;
      renderCategoryTabs();
      renderPlaylistGrid();
      showHome();
    }

    // Populate Main Course Grid Architecture
    function renderPlaylistGrid() {
      const targetDataset = activeCat === "all" 
        ? data.playlists 
        : data.playlists.filter(p => p.cat === activeCat);

      if (targetDataset.length === 0) {
        plContainer.innerHTML = `<div style="grid-column: 1/-1; padding: 4rem; text-align: center; color: var(--dim)">No playlists configured.</div>`;
        return;
      }

      plContainer.innerHTML = targetDataset.map(pl => {
        let categoryColorHex = "var(--dark)";
        if(pl.color === "blue") categoryColorHex = "var(--blue)";
        if(pl.color === "orange") categoryColorHex = "var(--orange)";
        if(pl.color === "pink") categoryColorHex = "var(--pink)";

        let videoCounter = 0;
        pl.sections.forEach(s => videoCounter += s.videos.length);

        return `
          <article class="course-card" onclick="openPlaylist('${pl.id}')">
            <div class="card-accent-bar" style="background: ${categoryColorHex}"></div>
            <div class="card-body">
              <div class="card-emoji-box">${pl.emoji}</div>
              <h3 class="card-title">${pl.title}</h3>
              <span class="badge-level">${pl.subtitle}</span>
              <p class="card-desc">${pl.desc}</p>
              <div class="card-footer">
                <div class="card-footer-meta">
                  <span>${pl.sections.length} Sections</span>
                  <span>•</span>
                  <span>${videoCounter} Videos</span>
                </div>
                <div class="card-arrow" style="color: ${categoryColorHex}">→</div>
              </div>
            </div>
          </article>
        `;
      }).join('');
    }

    // Navigation Switch Logic
    function openPlaylist(id) {
      const pl = data.playlists.find(p => p.id === id);
      if (!pl) return;

      domHome.classList.remove("active");
      domPlaylist.classList.add("active");
      domNavBack.style.display = "flex";
      catContainer.style.display = "none"; // Hide tabs when tracking internal syllabus views

      renderPlaylistDetailView(pl);
      window.scrollTo(0, 0);
    }

    function showHome() {
      domPlaylist.classList.remove("active");
      domHome.classList.add("active");
      domNavBack.style.display = "none";
      catContainer.style.display = "flex"; // Restore standard layout controls safely
      renderPlaylistGrid();
      window.scrollTo(0, 0);
    }

    // Process Selected Course Detail Output View
    function renderPlaylistDetailView(pl) {
      let totalVideos = 0;
      pl.sections.forEach(s => totalVideos += s.videos.length);
      
      let categoryColorHex = "var(--dark)";
      if(pl.color === "blue") categoryColorHex = "var(--blue)";
      if(pl.color === "orange") categoryColorHex = "var(--orange)";
      if(pl.color === "pink") categoryColorHex = "var(--pink)";

      plHeaderTarget.innerHTML = `
        <div class="playlist-hero">
          <div class="pl-hero-emoji">${pl.emoji}</div>
          <div class="pl-hero-info">
            <h1 class="pl-title">${pl.title}</h1>
            <p class="pl-desc">${pl.desc}</p>
            <div class="pl-stats-row">
              <div class="pl-stat-node">
                <span class="pl-stat-val">${pl.sections.length}</span>
                <span class="pl-stat-lbl">Modules</span>
              </div>
              <div class="pl-stat-node">
                <span class="pl-stat-val">${totalVideos}</span>
                <span class="pl-stat-lbl">Videos</span>
              </div>
              <div class="pl-stat-node">
                <span class="pl-stat-val">${pl.finalQuiz.length}</span>
                <span class="pl-stat-lbl">Exam Questions</span>
              </div>
            </div>
          </div>
        </div>
      `;

      let modulesHTML = "";

      pl.sections.forEach((sec, sIdx) => {
        const videosHTML = sec.videos.map(vid => `
          <a href="${vid.link}" target="_blank" class="video-node" rel="noopener noreferrer">
            <div class="video-play-ring" style="background: ${categoryColorHex}; color: ${pl.color === 'pink' ? 'var(--white)' : 'var(--dark)'}">▶</div>
            <div class="video-details">
              <span class="video-name">${vid.title}</span>
              <span class="video-runtime">${vid.dur} <span class="video-external-icon">↗</span></span>
            </div>
          </a>
        `).join('');

        const quizHTML = sec.quiz.map((qObj, qIdx) => {
          const stateKey = `${pl.id}-${sIdx}-${qIdx}`;
          const currentSelection = quizState[stateKey];

          const optionsHTML = qObj.opts.map((opt, oIdx) => {
            const isSelected = currentSelection === oIdx;
            const styleAttr = isSelected 
              ? `style="background: ${categoryColorHex}; color: ${pl.color === 'pink' ? 'var(--white)' : 'var(--dark)'}; border-color: ${categoryColorHex}; font-weight: 600;"` 
              : '';
            return `
              <button class="opt-btn" ${styleAttr} onclick="handleQuizSelection('${pl.id}', ${sIdx}, ${qIdx}, ${oIdx})">
                ${opt}
              </button>
            `;
          }).join('');

          return `
            <div class="quiz-item">
              <p class="quiz-prompt">Q${qIdx + 1}: ${qObj.q}</p>
              <div class="quiz-options-matrix">${optionsHTML}</div>
            </div>
          `;
        }).join('');

        modulesHTML += `
          <section class="section-block">
            <div class="section-header">
              <div class="section-index-ring" style="background: ${categoryColorHex}; color: ${pl.color === 'pink' ? 'var(--white)' : 'var(--dark)'}">${sIdx + 1}</div>
              <h2 class="section-title">${sec.title}</h2>
            </div>
            <div class="video-stack">
              ${videosHTML}
            </div>
            <div class="assessment-block">
              <div class="assessment-title">Section Verification Quiz</div>
              ${quizHTML}
            </div>
          </section>
        `;
      });

      // Comprehensive Final Exam Rendering Block
      const finalExamStateKeyPrefix = `${pl.id}-final`;
      const finalExamHTML = pl.finalQuiz.map((qObj, qIdx) => {
        const stateKey = `${finalExamStateKeyPrefix}-${qIdx}`;
        const currentSelection = quizState[stateKey];

        const optionsHTML = qObj.opts.map((opt, oIdx) => {
          const isSelected = currentSelection === oIdx;
          const styleAttr = isSelected 
            ? `style="background: ${categoryColorHex}; color: ${pl.color === 'pink' ? 'var(--white)' : 'var(--dark)'}; border-color: ${categoryColorHex}; font-weight: 600;"` 
              : '';
          return `
            <button class="opt-btn" ${styleAttr} onclick="handleFinalQuizSelection('${pl.id}', ${qIdx}, ${oIdx})">
              ${opt}
            </button>
          `;
        }).join('');

        return `
          <div class="quiz-item" style="text-align: left; margin-bottom: 2rem;">
            <p class="quiz-prompt">Exam Q${qIdx + 1}: ${qObj.q}</p>
            <div class="quiz-options-matrix">${optionsHTML}</div>
          </div>
        `;
      }).join('');

      modulesHTML += `
        <article class="capstone-card">
          <div class="capstone-icon">🏆</div>
          <h2 class="capstone-title">${pl.title} Comprehensive Final Certification Exam</h2>
          <p class="capstone-desc">Complete all module tracks above before validating comprehensive logic matrices here.</p>
          <div style="margin-top: 2.5rem;">
            ${finalExamHTML}
          </div>
        </article>
      `;

      plModulesTarget.innerHTML = modulesHTML;
    }

    // Save Selected Options to Local Instance Arrays Safely
    function handleQuizSelection(plId, sIdx, qIdx, oIdx) {
      const stateKey = `${plId}-${sIdx}-${qIdx}`;
      quizState[stateKey] = oIdx;
      
      const pl = data.playlists.find(p => p.id === plId);
      renderPlaylistDetailView(pl);
    }

    // Save Final Selected Exam Options 
    function handleFinalQuizSelection(plId, qIdx, oIdx) {
      const stateKey = `${plId}-final-${qIdx}`;
      quizState[stateKey] = oIdx;
      
      const pl = data.playlists.find(p => p.id === plId);
      renderPlaylistDetailView(pl);
    }
  </script>
</body>
</html>
